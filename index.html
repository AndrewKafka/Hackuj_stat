<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bydlio.cz</title>

    <!-- Links -->
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/map.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<header>
    <div id="logo_box" class="header_box">
        <img src="assets/Logo.2,0.svg" id="logo_img" alt="Bydlio logo">
    </div>

    <nav id="header_nav">
        <ul>
            <li><a href="#">Nejlepší bydlení</a></li>
            <li><a href="#">Kontakty</a></li>
        </ul>
    </nav>
</header>

<main id="main_container">

    <!-- LEFT SIDE PANEL -->
    <aside id="side_panel">
        <button id="toggle_panel">&#9776;</button> <!-- hamburger icon -->
        <h3 id="filter_text">Filtrování</h3>
        <br>

        <div class="panel_section">
        <label for="rozloha">Rozloha [m²]</label>
        <input type="number" id="rozloha_text" name="rozloha_text" placeholder="1000000">
        </div>
        <div class="panel_section">
            <label for="cena_nemovitosti">Cena Nemovitosti [Kč]</label>
            <input type="number" id="cena_nemovitosti" name="cena_nemovitosti" placeholder="1000000">
        </div>

        
        <div class="panel_section">
            <label>Kde chcete bydlet</label>
            <input type="text" class="location_search" placeholder="Search location...">
            <div class="location_list dropdown_list"></div>
        </div>

        <div class="panel_section">
            <label>Místo práce</label>
            <input type="text" class="location_search" placeholder="Search location...">
            <div class="location_list dropdown_list"></div>
        </div>




        <div class="panel_section">
            <label for="dopa_dojezdu">Doba dojezdu do práce [min]</label>
            <input type="number" id="dopa_dojezdu" name="dopa_dojezdu" placeholder="100">
        </div>

        <button id="apply_filters">Filtrovat</button>
    </aside>

    <!-- MAP -->
    <div id="main_map">
        <div id="vyber_datasetu">

            <select id="dataset-select">
                <option value="">Choose dataset</option>
            </select>

        </div>
    </div>

    



</main>

<!-- BOTTOM PANEL -->
<div id="bottom_panel">
    <div class="panel_content">
        <div class="data_row">
            <span class="data_label">Okres:</span>
            <span class="data_value" id="okres_name">NaN</span>
        </div>

        <!-- Index Života -->
        <div class="data_row slider_row">
            <span class="data_label">Index Života:</span>
            <div class="slider_bg">
                <div class="slider_fill" id="index_zivota"></div>
            </div>
        </div>

        <!-- Index Ceny Bydlení -->
        <div class="data_row slider_row">
            <span class="data_label">Index Ceny Bydlení:</span>
            <div class="slider_bg">
                <div class="slider_fill" id="index_ceny_bydleni"></div>
            </div>
        </div>

        <!-- Index Kvality Ovzdusi -->
        <div class="data_row slider_row">
            <span class="data_label">Index Kvality Ovzduší:</span>
            <div class="slider_bg">
                <div class="slider_fill" id="index_kvality_ovzdusi"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div id="footer_box"></div>
  <div id="footer_top">
    <div id="footer_contact">
      <h3>Kontakt</h3>
      <p>Tel: +420 712 345 678</p>
      <p>Email: bydlio@gmail.cz</p>
      <p>Adresa: Komunardů 1034/44, Praha 7 - Holešovice</p>

      <div id="social_media">
        <a href="https://www.instagram.com/bydlio.cz/" target="_blank">
          <img src="assets/instagram.png" alt="Instagram" class="social_icon">
        </a>
        <a href="https://x.com/Bydlio_cz" target="_blank">
          <img src="assets/twitter.png" alt="Twitter" class="social_icon">
        </a>
        <a href="https://www.youtube.com/@Bydlio_official" target="_blank">
          <img src="assets/youtube.png" alt="Youtube" class="social_icon">
        </a>
      </div>
    </div>
  </div>

  <div id="footer_bottom">
    <p>&copy; 2026 Bydlio.cz. Všechna práva vyhrazena.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map/map.js"></script>
<script src="script.js"></script>
<script src="scripts/sidebitch.js"></script>
<script src="scripts/vyber_dat.js"></script>
<script src="scripts/Filtrovat.js"></script>
<script src="scripts/uprava_cen.js"></script>

</body>
</html>
