<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bydlio.cz</title>

    <!-- Links -->
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/map.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<header>
    <div id="logo_box" class="header_box">
        <img src="assets/Logo.2,0.svg" id="logo_img" alt="Bydlio logo">
    </div>

    <nav id="header_nav">
        <ul>
            <li><a href="#">Nejlepší bydlení</a></li>
            <li><a href="#">Kontakty</a></li>
        </ul>
    </nav>
</header>

<main id="main_container">

    <!-- LEFT SIDE PANEL -->
    <aside id="side_panel">
        <button id="toggle_panel">&#9776;</button> <!-- hamburger icon -->
        <h3 id="filter_text">Filtrování</h3>
        <br>

        <div class="panel_section">
        <label for="rozloha">Rozloha [m²]</label>
        <input type="number" id="rozloha_text" name="rozloha_text" placeholder="1000000">
        </div>
        <div class="panel_section">
            <label for="cena_nemovitosti">Cena Nemovitosti [Kč]</label>
            <input type="number" id="cena_nemovitosti" name="cena_nemovitosti" placeholder="1000000">
        </div>
        <div class="panel_section">
            <label for="mesto">Město vašeho zaměstnání</label>
            <select id="property_type" name="property_type">
                <option value="">Any</option>
                <option value="apartment">Apartment</option>
                <option value="house">House</option>
                <option value="land">Land</option>
                <option value="commercial">Commercial</option>
            </select>
        </div>
        <div class="panel_section">
            <label for="dopa_dojezdu">Doba dojezdu do práce [min]</label>
            <input type="number" id="dopa_dojezdu" name="dopa_dojezdu" placeholder="100">
        </div>
        

        <button id="apply_filters">Apply Filters</button>
    </aside>

    <!-- MAP -->
    <div id="main_map"></div>

    

</main>

<!-- BOTTOM PANEL -->
    <div id="bottom_panel">
        <div class="panel_content">
            <p>Data item 1</p>
            <p>Data item 2</p>
            <p>Data item 3</p>
            <!-- Repeat content for testing scroll -->
            <p>Data item 4</p>
            <p>Data item 5</p>
            <p>Data item 6</p>
            <p>Data item 7</p>
            <p>Data item 8</p>
            <p>Data item 9</p>
            <p>Data item 10</p>
            <p>Data item 11</p>
            <p>Data item 12</p>
        </div>
    </div>

<footer>
    Footer
</footer>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map/map.js"></script>
<script src="script.js"></script>

</body>
</html>
